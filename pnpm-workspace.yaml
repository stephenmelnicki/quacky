shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - undici@6.21.3
  - chokidar@4.0.3

packages:
  - docs
  - bot

catalogs:
  bot:
    discord.js: ^14.25.0
    pino: ^10.3.1
    pino-pretty: ^13.1.3
    queue: ^7.0.0
  docs:
    vitepress: ^1.6.4
  eslint:
    '@antfu/eslint-config': ^7.7.3
    eslint: ^10.1.0
    eslint-plugin-format: ^2.0.1
  prisma:
    '@prisma/adapter-pg': ^7.5.0
    '@prisma/client': ^7.5.0
    '@types/pg': ^8.20.0
    prisma: ^7.5.0
  typescript:
    '@types/node': ^25.5.0
    tsx: ^3.7.0
    typescript: ^5.9.3
  utils:
    dotenv: ^17.3.1
    lint-staged: ^16.2.7
    pnpm: ^10.32.1
    simple-git-hooks: ^2.13.1
